name: Build and deploy Node.js app to Azure Web App - pa4-26100273

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install, build, test
        run: |
          cd webapp
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: webapp

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: webapp   

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C014B43BF62F4E6F8E21B4AAA3B34015 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_39E059B3416642E6B291DEE2F36B5BC4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A8E1AC1251A5429FBFC4A463504E9FB0 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pa4-26100273'
          package: webapp  
